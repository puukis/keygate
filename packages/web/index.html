<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%230b1020'/%3E%3Cpath d='M18 16h10v14l12-14h12L39 31l14 17H40L28 34v14H18V16Z' fill='%23f8fafc'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <title>Keygate</title>
    <meta
      name="description"
      content="Personal AI agent gateway - control your computer via chat"
    />
    <script>
      (() => {
        const STORAGE_KEY = 'keygate.themePreference';
        const validValues = new Set(['system', 'light', 'dark']);

        let preference = 'system';
        try {
          const storedValue = window.localStorage.getItem(STORAGE_KEY);
          if (validValues.has(String(storedValue))) {
            preference = String(storedValue);
          }
        } catch {
          preference = 'system';
        }

        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const resolvedTheme = preference === 'system' ? systemTheme : preference;

        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.style.colorScheme = resolvedTheme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
